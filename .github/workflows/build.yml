name: Java Build CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Compile Application
      run: |
        mkdir -p out
        javac -cp "lib/sqlite-jdbc.jar:lib/slf4j-api.jar:lib/slf4j-simple.jar" \
              -d out \
              src/project/*.java

    - name: Package JAR
      run: |
        mkdir -p dist
        jar --create \
            --file dist/SmartSnake.jar \
            --main-class project.Project \
            -C out project
